version: "2"

run:
  timeout: 5m
  go: "1.24"

linters:
  default: none
  enable:
    - errcheck       # check error return values are handled
    - govet          # go vet checks
    - staticcheck    # staticcheck SA + S (replaces gosimple)
    - misspell       # common English misspellings in comments/strings
    - unconvert      # remove unnecessary type conversions
    - ineffassign    # detect ineffectual assignments
    - unused         # unused code
    - bodyclose      # check http response body is closed
    - noctx          # http requests should use context
    - copyloopvar    # loop variable capture in goroutines (go1.22+)

  settings:
    errcheck:
      check-blank: false   # allow _ = someErr() for fire-and-forget cache writes
      exclude-functions:
        - (io.Closer).Close        # defer f.Close() is idiomatic; errors rarely actionable
        - (*os.File).Close         # defer f.Close() on read/write files
        - (*compress/gzip.Reader).Close
    misspell:
      locale: US
    govet:
      enable-all: true
      disable:
        - shadow         # too noisy for short-lived err vars

formatters:
  enable:
    - gofmt

issues:
  exclude-rules:
    # Test files: relax errcheck (table-driven tests often ignore errors intentionally)
    - path: "_test\\.go"
      linters: [errcheck, bodyclose]
    # main.go: allow fmt.Println without error check
    - path: "cmd/"
      linters: [errcheck]
      text: "fmt\\.Print"
  max-issues-per-linter: 0
  max-same-issues: 0
