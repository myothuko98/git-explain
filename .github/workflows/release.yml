name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/git-explain-darwin-amd64  ./cmd/git-explain
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/git-explain-darwin-arm64  ./cmd/git-explain
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/git-explain-linux-amd64   ./cmd/git-explain
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/git-explain-linux-arm64   ./cmd/git-explain

      - name: Run tests
        run: go test ./...

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
